<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Radio en Vivo</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{

background:radial-gradient(circle at top,#10203b,#05070d,#000);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;

}

/* Fondo animado */

body:before{
content:'';
position:absolute;
width:600px;
height:600px;
background:#00bfff;
filter:blur(180px);
opacity:.35;
animation:giro 15s linear infinite;
}

@keyframes giro{
100%{transform:rotate(360deg);}
}

/* Player */

.player{

width:360px;
padding:35px;
border-radius:35px;

background:rgba(255,255,255,.08);
backdrop-filter:blur(25px);

border:1px solid rgba(255,255,255,.2);

box-shadow:

0 0 25px #00c3ff,
0 0 60px rgba(0,195,255,.6),
0 25px 50px rgba(0,0,0,.6);

text-align:center;

position:relative;
z-index:2;

transform:perspective(5000px) rotateX(10deg);

}

.logo{

width:150px;
height:150px;
margin:auto;
border-radius:50%;

background:url("https://static.wixstatic.com/media/c5802d_8370224db4a3403ab6d1fc32d69c3099~mv2.png") center/85% no-repeat,#8fe5ff;

border:5px solid #00c3ff;

box-shadow:
0 0 20px #00c3ff,
0 0 60px #00c3ff;

}

h1{

margin-top:25px;
color:#fff;
font-size:28px;
text-shadow:
0 0 10px #00c3ff,
0 0 30px #00c3ff;

}

.estado{

margin-top:8px;
color:#90eaff;
font-size:14px;

}

/* Botón */

button{

margin-top:30px;
width:90px;
height:90px;
border-radius:50%;
border:none;

font-size:32px;
cursor:pointer;

background:linear-gradient(#00d5ff,#006eff);

color:white;

box-shadow:

0 0 20px #00c3ff,
0 0 60px #00c3ff,
inset 0 0 10px rgba(255,255,255,.8);

transition:.3s;

}

button:hover{

transform:scale(1.12);

box-shadow:
0 0 35px cyan,
0 0 90px cyan;

}

/* Ecualizador */

.equalizer{

display:flex;
justify-content:center;
align-items:flex-end;
gap:5px;

height:60px;
margin-top:30px;

}

.equalizer span{

width:7px;
height:20px;
border-radius:10px;

background:#00c3ff;

box-shadow:0 0 15px cyan;

animation:equalizer 1s infinite;

}

.equalizer span:nth-child(2){animation-delay:.2s;}
.equalizer span:nth-child(3){animation-delay:.4s;}
.equalizer span:nth-child(4){animation-delay:.1s;}
.equalizer span:nth-child(5){animation-delay:.5s;}
.equalizer span:nth-child(6){animation-delay:.3s;}
.equalizer span:nth-child(7){animation-delay:.6s;}

@keyframes equalizer{

0%{height:15px;}
50%{height:55px;}
100%{height:15px;}

}

footer{

margin-top:25px;
color:#8fdcff;
font-size:13px;

}
/* Redes Sociales */

.social{

display:flex;
justify-content:center;
gap:15px;
margin:25px 0;

}

.social a{

width:50px;
height:50px;
border-radius:50%;

display:flex;
align-items:center;
justify-content:center;

background:rgba(255,255,255,.08);

border:1px solid rgba(255,255,255,.2);

color:#fff;
font-size:24px;
text-decoration:none;

box-shadow:
0 0 15px rgba(0,195,255,.8);

transition:.3s;

}

.social a:hover{

transform:translateY(-5px) scale(1.15);

box-shadow:
0 0 20px #00c3ff,
0 0 45px #00c3ff;

}

/* Colores */

.facebook:hover{
background:#1877F2;
}

.youtube:hover{
background:#FF0000;
}

.instagram:hover{
background:linear-gradient(45deg,#F58529,#DD2A7B,#8134AF,#515BD4);
}

.whatsapp:hover{
background:#25D366;
}
</style>

</head>
<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
<body>

<div class="player">

<div class="logo"></div>

<h1>RADIO SHADDAI</h1>

<div class="estado" id="estado">Presiona Play</div>

<button id="play">Play</button>

<div class="equalizer">

<span></span>
<span></span>
<span></span>
<span></span>
<span></span>
<span></span>
<span></span>

</div>
<div class="social">

<a class="facebook"
href="https://www.facebook.com/share/1L8SavcC2n/"
target="_blank">
<i class="fab fa-facebook-f"></i>
</a>

<a class="whatsapp"
href="https://wa.me/qr/HABLMTBGH6NDJ1"
target="_blank">
<i class="fab fa-whatsapp"></i>
</a>

</div>
<footer>
ServidorZenoRadio
</footer>

<audio id="radio">

<source src="https://stream.zeno.fm/qtqyys4aguhvv" type="audio/mpeg">

</audio>

</div>

<script>

const audio=document.getElementById("radio");
const boton=document.getElementById("play");
const estado=document.getElementById("estado");

boton.onclick=function(){

if(audio.paused){

audio.play();

boton.innerHTML="Stop";

estado.innerHTML="REPRODUCIENDO";

}else{

audio.pause();

boton.innerHTML="PLAY";

estado.innerHTML="Pausado";

}

}

</script>

</body>
</html>
