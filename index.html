<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Centro Multimedia Streaming</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,Helvetica,sans-serif;
}

body{
    background:linear-gradient(135deg,#020024,#003366,#005b96);
    min-height:100vh;
    color:white;
}

.login{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    width:350px;
    background:rgba(255,255,255,.08);
    padding:30px;
    border-radius:20px;
    backdrop-filter:blur(12px);
    box-shadow:0 0 25px cyan;
    text-align:center;
}

.login h2{
    margin-bottom:20px;
}

input{
    width:100%;
    padding:15px;
    border:none;
    border-radius:10px;
    margin:10px 0;
    font-size:16px;
}

button{
    width:100%;
    padding:15px;
    border:none;
    border-radius:10px;
    background:#00aaff;
    color:white;
    font-size:18px;
    cursor:pointer;
}

button:hover{
    background:#00ddff;
}

#error{
    color:#ff5555;
    margin-top:10px;
}

#contenido{
    display:none;
}

header{
    background:#0008;
    padding:20px;
    text-align:center;
    font-size:35px;
    box-shadow:0 0 15px cyan;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
    gap:30px;
    padding:40px;
}

.card{
    background:rgba(255,255,255,.08);
    border-radius:20px;
    overflow:hidden;
    transition:.3s;
    box-shadow:0 0 15px rgba(0,255,255,.3);
}

.card:hover{
    transform:scale(1.05);
    box-shadow:0 0 25px cyan;
}

.card img{
    width:100%;
    height:180px;
    object-fit:cover;
}

.card h2{
    text-align:center;
    margin:15px;
}

.card a{
    display:block;
    margin:20px;
    padding:15px;
    text-align:center;
    text-decoration:none;
    color:white;
    background:#008cff;
    border-radius:10px;
    font-weight:bold;
}

.card a:hover{
    background:#00cfff;
}
</style>
</head>

<body>

<div id="login" class="login">

<h2>🔒 Acceso Privado</h2>

<input type="password" id="password" placeholder="Ingrese la contraseña">

<button onclick="entrar()">INGRESAR</button>

<div id="error"></div>

</div>

<div id="contenido">

<header>

📡 CENTRO MULTIMEDIA EN VIVO

</header>

<div class="grid">

<div class="card">

<img src="https://images.unsplash.com/photo-1516280440614-37939bbacd81?w=900" alt="Radio">

<h2>📻 RADIO EN VIVO</h2>

<a href="https://TU_STREAM_RADIO" target="_blank">
Escuchar Radio
</a>

</div>

<div class="card">

<img src="https://images.unsplash.com/photo-1574375927938-d5a98e8ffe85?w=900" alt="TV">

<h2>📺 TV EN VIVO</h2>

<a href="https://TU_STREAM_TV" target="_blank">
Ver TV
</a>

</div>

</div>

</div>

<script>

const CONTRASENA="radio2026";

function entrar(){

const pass=document.getElementById("password").value;

if(pass===CONTRASENA){

document.getElementById("login").style.display="none";

document.getElementById("contenido").style.display="block";

}else{

document.getElementById("error").innerHTML="Contraseña incorrecta";

}

}

</script>

</body>
</html>
